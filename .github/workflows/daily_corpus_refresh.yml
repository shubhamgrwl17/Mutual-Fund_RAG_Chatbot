name: Daily Corpus Refresh

on:
  schedule:
    # 03:30 UTC = 09:00 AM IST
    - cron: '30 3 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  refresh-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run corpus refresh pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          CHROMA_AUTH_TOKEN: ${{ secrets.CHROMA_AUTH_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: python src/phase0_scheduler/daily_refresh.py

      - name: Run Final Quality Gate
        run: python src/phase0_scheduler/validate_data.py

      - name: Commit updated data
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          git diff --cached --quiet || (git commit -m "chore: daily corpus refresh $(date -u +%Y-%m-%d)" && git push)

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily corpus refresh failed. Check logs for details."
          # Future: add Slack webhook notification here
