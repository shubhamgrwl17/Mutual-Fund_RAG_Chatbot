name: Daily Corpus Refresh

on:
  schedule:
    # 00:30 UTC is 06:00 AM IST
    - cron: '30 0 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]

jobs:
  refresh-corpus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for diff detection
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Refresh Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_AUTH_TOKEN: ${{ secrets.CHROMA_AUTH_TOKEN }}
          CHROMA_MODE: remote
        run: python src/phase0_scheduler/daily_refresh.py

      - name: Run Data Quality Gate
        run: python src/phase0_scheduler/validate_data.py

      - name: Commit and Push changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: daily corpus refresh $(date +%Y-%m-%d)" && git push)

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily corpus refresh failed. Check logs for details."

  sync-to-hub:
    needs: refresh-corpus
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          # Sync to Hugging Face Space using a 'Clean Slate' approach to avoid history issues
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git checkout --orphan deploy_branch
          git add .
          git commit -m "deploy: clean state without history"
          git push --force https://shub17:$HF_TOKEN@huggingface.co/spaces/shub17/Mutual-Fund_RAG_Chatbot.git deploy_branch:main
